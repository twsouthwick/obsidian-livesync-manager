mode: ContinuousDeployment
branches:
  main:
    regex: ^(main|master)$
    increment: Patch
    is-main-branch: true
  feature:
    regex: ^features?[/-]
    increment: Inherit
    source-branches: [main]
  pull-request:
    regex: ^(pull|pull\-requests|pr)[/-]
    increment: Inherit
    source-branches: [main, feature]
